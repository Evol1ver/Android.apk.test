name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Prepare release file
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PriceMonitor-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/PriceMonitor-debug.apk

      - name: Publish latest APK release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-apk
          name: Latest APK (Auto)
          artifacts: app/build/outputs/apk/debug/PriceMonitor-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          body: |
            Automatically built from commit ${{ github.sha }}.
